<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGI Rush — Feedback</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Courier New', monospace; background: #0a0e14; color: #c5c8c6; height: 100vh; display: flex; flex-direction: column; }

.topbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: #141920; border-bottom: 1px solid #1e2630; flex-shrink: 0; }
.topbar h1 { font-size: 14px; color: #3fb950; }
.topbar a { font-size: 11px; color: #6272a4; text-decoration: none; }
.topbar a:hover { color: #c5c8c6; }
.topbar button { font-family: inherit; font-size: 11px; padding: 4px 12px; border: 1px solid #e94560; border-radius: 4px; background: #0d1117; color: #e94560; cursor: pointer; }
.topbar button:hover { background: #e94560; color: #fff; }
#status { color: #6272a4; font-size: 11px; margin-left: auto; }

.main { display: flex; flex: 1; overflow: hidden; }

/* Input panel */
.input-panel { width: 450px; border-right: 1px solid #1e2630; display: flex; flex-direction: column; background: #0d1117; flex-shrink: 0; padding: 16px; gap: 12px; }
.input-panel h2 { font-size: 12px; color: #58a6ff; text-transform: uppercase; letter-spacing: 1px; }

.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 11px; padding: 3px 10px; border: 1px solid #1e2630; border-radius: 12px; cursor: pointer; background: #161b22; color: #6272a4; transition: all 0.15s; user-select: none; }
.tag:hover { border-color: #58a6ff; color: #8b949e; }
.tag.active { border-color: #58a6ff; background: #1a2a3a; color: #58a6ff; }

textarea { flex: 1; padding: 12px; background: #161b22; border: 1px solid #1e2630; border-radius: 6px; color: #c5c8c6; font-family: inherit; font-size: 13px; line-height: 1.6; resize: none; outline: none; }
textarea:focus { border-color: #58a6ff; }
textarea::placeholder { color: #484f58; }

.submit-btn { padding: 10px; border: 1px solid #3fb950; border-radius: 6px; background: #0d1117; color: #3fb950; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: bold; transition: all 0.15s; }
.submit-btn:hover { background: #3fb950; color: #fff; }
.submit-btn:disabled { opacity: 0.3; cursor: default; }

/* History panel */
.history-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.history-header { padding: 8px 16px; font-size: 11px; color: #6272a4; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #1e2630; background: #0d1117; }
.history-body { flex: 1; overflow-y: auto; padding: 16px; }

.feedback-entry { margin-bottom: 16px; padding: 12px; background: #161b22; border: 1px solid #1e2630; border-radius: 6px; border-left: 3px solid #3fb950; }
.feedback-entry .timestamp { font-size: 10px; color: #484f58; margin-bottom: 4px; }
.feedback-entry .entry-tags { display: flex; gap: 4px; margin-bottom: 6px; }
.feedback-entry .entry-tag { font-size: 9px; padding: 1px 6px; border-radius: 8px; background: #1a2a3a; color: #58a6ff; }
.feedback-entry .text { font-size: 12px; color: #c9d1d9; line-height: 1.5; white-space: pre-wrap; }

.empty-state { color: #484f58; font-size: 12px; text-align: center; padding: 40px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Feedback & Suggestions</h1>
  <a href="/">Tech Tree</a>
  <a href="/items">Items</a>
  <button onclick="clearAll()">Clear All</button>
  <span id="status"></span>
</div>

<div class="main">
  <div class="input-panel">
    <h2>New Feedback</h2>

    <div class="tags" id="tags"></div>

    <textarea id="feedback-text" placeholder="Describe what you want changed, added, or fixed...&#10;&#10;Examples:&#10;- Interns feel too weak for their cost&#10;- Need a FLOPS upgrade between freelancing and startup&#10;- Coffee chain is fun but doppio is too expensive&#10;- Add a 'server room' item at startup tier"></textarea>

    <button class="submit-btn" id="submit-btn" onclick="submitFeedback()">Submit Feedback</button>
  </div>

  <div class="history-panel">
    <div class="history-header">History</div>
    <div class="history-body" id="history-body"></div>
  </div>
</div>

<script>
const API = '/api/feedback';

const TAG_DEFS = [
  { id: 'balance', label: 'Balance', color: '#d19a66' },
  { id: 'tech-tree', label: 'Tech Tree', color: '#c678dd' },
  { id: 'items', label: 'Items', color: '#58a6ff' },
  { id: 'new-feature', label: 'New Feature', color: '#3fb950' },
  { id: 'bug', label: 'Bug', color: '#e94560' },
  { id: 'ui', label: 'UI/UX', color: '#8be9fd' },
  { id: 'pacing', label: 'Pacing', color: '#e5c07b' },
  { id: 'idea', label: 'Idea', color: '#c678dd' },
];

let activeTags = new Set();

function status(msg) {
  document.getElementById('status').textContent = msg;
  setTimeout(() => document.getElementById('status').textContent = '', 2000);
}

// Render tags
function renderTags() {
  const el = document.getElementById('tags');
  el.innerHTML = TAG_DEFS.map(t => {
    const active = activeTags.has(t.id) ? ' active' : '';
    return '<span class="tag' + active + '" style="' + (activeTags.has(t.id) ? 'border-color:' + t.color + ';color:' + t.color : '') + '" onclick="toggleTag(\'' + t.id + '\')">' + t.label + '</span>';
  }).join('');
}

function toggleTag(id) {
  if (activeTags.has(id)) activeTags.delete(id);
  else activeTags.add(id);
  renderTags();
}

// Submit
async function submitFeedback() {
  const text = document.getElementById('feedback-text').value.trim();
  if (!text) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, tags: [...activeTags] })
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('feedback-text').value = '';
      activeTags = new Set();
      renderTags();
      status('Feedback submitted!');
      loadHistory();
    } else {
      status('Error: ' + data.error);
    }
  } catch { status('Failed to submit'); }

  btn.disabled = false;
}

// History
async function loadHistory() {
  const body = document.getElementById('history-body');
  try {
    const res = await fetch(API);
    const md = await res.text();
    if (!md.trim() || md.trim() === '# Feedback\n\nCleared.') {
      body.innerHTML = '<div class="empty-state">No feedback yet. Write something!</div>';
      return;
    }

    // Parse markdown entries: ## timestamp [tags]\n\ntext
    const entries = [];
    const sections = md.split(/^## /m).filter(Boolean);
    for (const section of sections) {
      const lines = section.split('\n');
      const header = lines[0];
      const tagMatch = header.match(/\[(.+?)\]/);
      const tags = tagMatch ? tagMatch[1].split(', ') : [];
      const timestamp = header.replace(/\s*\[.+?\]/, '').trim();
      const text = lines.slice(2).join('\n').trim();
      if (text) entries.push({ timestamp, tags, text });
    }

    entries.reverse(); // newest first

    body.innerHTML = entries.map(e => {
      const tagHtml = e.tags.map(t => {
        const def = TAG_DEFS.find(d => d.id === t);
        const color = def ? def.color : '#6272a4';
        return '<span class="entry-tag" style="color:' + color + ';border:1px solid ' + color + '">' + (def ? def.label : t) + '</span>';
      }).join('');
      return '<div class="feedback-entry">'
        + '<div class="timestamp">' + escapeHtml(e.timestamp) + '</div>'
        + (tagHtml ? '<div class="entry-tags">' + tagHtml + '</div>' : '')
        + '<div class="text">' + escapeHtml(e.text) + '</div>'
        + '</div>';
    }).join('');
  } catch {
    body.innerHTML = '<div class="empty-state">Could not load history</div>';
  }
}

function escapeHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

async function clearAll() {
  if (!confirm('Clear all feedback?')) return;
  await fetch(API, { method: 'DELETE' });
  loadHistory();
  status('Cleared');
}

// Ctrl+Enter to submit
document.getElementById('feedback-text').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitFeedback();
});

renderTags();
loadHistory();
</script>
</body>
</html>
