<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGI Rush — Item Pool Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Courier New', monospace; background: #0a0e14; color: #c5c8c6; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

.topbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: #141920; border-bottom: 1px solid #1e2630; flex-shrink: 0; }
.topbar h1 { font-size: 14px; color: #d19a66; }
.topbar button { font-family: inherit; font-size: 11px; padding: 4px 12px; border: 1px solid #58a6ff; border-radius: 4px; background: #0d1117; color: #58a6ff; cursor: pointer; }
.topbar button:hover { background: #58a6ff; color: #fff; }
.topbar .danger { border-color: #e94560; color: #e94560; }
.topbar .danger:hover { background: #e94560; color: #fff; }
.topbar a { font-size: 11px; color: #6272a4; text-decoration: none; }
.topbar a:hover { color: #c5c8c6; }
#status { color: #6272a4; font-size: 11px; margin-left: auto; }

.main { display: flex; flex: 1; overflow: hidden; }

/* List panel */
.list-panel { width: 350px; border-right: 1px solid #1e2630; display: flex; flex-direction: column; background: #0d1117; flex-shrink: 0; }
.list-header { padding: 8px 12px; font-size: 11px; color: #6272a4; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #1e2630; display: flex; justify-content: space-between; align-items: center; }
.list-filter { width: 100%; padding: 6px 12px; background: #161b22; border: none; border-bottom: 1px solid #1e2630; color: #c5c8c6; font-family: inherit; font-size: 12px; outline: none; }
.list-body { flex: 1; overflow-y: auto; padding: 8px; }
.tier-group-header { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; padding: 8px 0 4px; margin-top: 4px; border-bottom: 1px solid #1e2630; font-weight: bold; }
.item-card { padding: 10px; margin-bottom: 6px; background: #161b22; border: 1px solid #1e2630; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
.item-card:hover { border-color: #58a6ff; }
.item-card.selected { border-color: #58a6ff; background: #1a2030; }
.item-card .name { font-size: 13px; font-weight: bold; color: #c9d1d9; }
.item-card .meta { font-size: 10px; color: #6272a4; margin-top: 2px; }
.item-card .cost { font-size: 10px; color: #d19a66; margin-top: 2px; }

/* Editor panel */
.editor { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: #0d1117; }
.editor-header { padding: 8px 12px; font-size: 11px; color: #6272a4; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #1e2630; }
.editor-body { padding: 16px; }
.editor-empty { padding: 40px 16px; color: #484f58; font-size: 12px; text-align: center; }

.field { margin-bottom: 12px; }
.field label { display: block; font-size: 10px; color: #6272a4; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.field input, .field select, .field textarea { width: 100%; padding: 5px 8px; background: #161b22; border: 1px solid #1e2630; border-radius: 4px; color: #c5c8c6; font-family: inherit; font-size: 12px; outline: none; }
.field input:focus, .field select:focus { border-color: #58a6ff; }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }

.effects-editor { margin-top: 4px; }
.effect-row { display: flex; gap: 4px; margin-bottom: 4px; align-items: center; }
.effect-row select, .effect-row input { padding: 3px 6px; background: #161b22; border: 1px solid #1e2630; border-radius: 3px; color: #c5c8c6; font-family: inherit; font-size: 11px; }
.effect-row .remove-effect { cursor: pointer; color: #e94560; font-size: 14px; background: none; border: none; font-family: inherit; }
.add-effect-btn { font-family: inherit; font-size: 10px; padding: 3px 8px; border: 1px dashed #58a6ff; border-radius: 3px; background: none; color: #58a6ff; cursor: pointer; margin-top: 4px; }

.delete-btn { margin-top: 16px; width: 100%; padding: 6px; border: 1px solid #e94560; border-radius: 4px; background: none; color: #e94560; cursor: pointer; font-family: inherit; font-size: 11px; }
.delete-btn:hover { background: #e94560; color: #fff; }

/* Cost preview */
.cost-preview { margin-top: 8px; padding: 8px; background: #161b22; border: 1px solid #1e2630; border-radius: 4px; font-size: 10px; color: #8b949e; }
.cost-preview .row { display: flex; justify-content: space-between; padding: 1px 0; }
.cost-preview .row .val { color: #d19a66; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Item Pool Editor</h1>
  <button onclick="addItem()">+ New Item</button>
  <button onclick="duplicateItem()">⎘ Duplicate</button>
  <a href="/">Tech Tree</a>
  <a href="/feedback" style="color:#3fb950">Feedback</a>
  <span id="status"></span>
</div>

<div class="main">
  <div class="list-panel">
    <div class="list-header">
      <span>Items</span>
      <span id="item-count">0</span>
    </div>
    <input class="list-filter" placeholder="Filter items..." oninput="renderList(this.value)">
    <div class="list-body" id="list-body"></div>
  </div>

  <div class="editor">
    <div class="editor-header">Item Editor</div>
    <div id="editor-body"></div>
  </div>
</div>

<script>
const API = '/api/items';
const TIERS = ['garage', 'freelancing', 'startup', 'tech_company', 'ai_lab', 'agi_race'];
const TIER_NAMES = { garage: 'Garage', freelancing: 'Freelancing', startup: 'Startup', tech_company: 'Tech Company', ai_lab: 'AI Lab', agi_race: 'AGI Race' };
const TIER_COLORS = { garage: '#6272a4', freelancing: '#8be9fd', startup: '#3fb950', tech_company: '#d19a66', ai_lab: '#c678dd', agi_race: '#e94560' };
const EFFECT_TYPES = [
  'flops', 'cpuFlops', 'ramFlops', 'storageFlops',
  'internLoc', 'devLoc', 'teamLoc', 'managerLoc', 'autoLoc',
  'locPerKey', 'locProductionSpeed', 'devSpeed',
  'cashMultiplier', 'instantCash',
  'internLocMultiplier', 'devLocMultiplier', 'teamLocMultiplier', 'managerMultiplier',
  'internCostDiscount', 'devCostDiscount', 'teamCostDiscount', 'managerCostDiscount',
  'singularity'
];
const OPS = ['add', 'multiply', 'set', 'enable'];
const COST_CATEGORIES = ['', 'intern', 'dev', 'team', 'manager'];

let items = [];
let selectedId = null;
let saveTimeout = null;

function status(msg) {
  document.getElementById('status').textContent = msg;
  setTimeout(() => document.getElementById('status').textContent = '', 2000);
}

function save() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveToServer, 500);
  status('Saving...');
}

async function saveToServer() {
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ upgrades: items }, null, 2)
    });
    const data = await res.json();
    if (data.ok) status('Saved ' + data.count + ' items');
    else status('Error: ' + data.error);
  } catch { status('Offline — save failed'); }
}

async function loadFromServer() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    if (data.upgrades) {
      items = data.upgrades;
      status('Loaded ' + items.length + ' items');
    }
  } catch { status('Could not connect — run: npm run tree-editor'); }
  render();
}

function getItem(id) { return items.find(i => i.id === id); }

function escapeHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function formatNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toString();
}

// ── CRUD ──

function addItem() {
  const id = 'item_' + Date.now();
  items.push({
    id, tier: 'garage', name: 'New Item', description: '', icon: '🔧',
    baseCost: 100, costMultiplier: 1.5, max: 5, effects: []
  });
  selectedId = id;
  save(); render();
}

function duplicateItem() {
  if (!selectedId) return;
  const src = getItem(selectedId);
  if (!src) return;
  const clone = JSON.parse(JSON.stringify(src));
  clone.id = src.id + '_copy';
  clone.name = src.name + ' (copy)';
  items.push(clone);
  selectedId = clone.id;
  save(); render();
}

function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  if (selectedId === id) selectedId = null;
  save(); render();
}

function moveItem(id, dir) {
  const idx = items.findIndex(i => i.id === id);
  if (idx < 0) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= items.length) return;
  [items[idx], items[newIdx]] = [items[newIdx], items[idx]];
  save(); render();
}

// ── Render ──

function render() {
  renderList(document.querySelector('.list-filter')?.value || '');
  renderEditor();
  document.getElementById('item-count').textContent = items.length;
}

function renderList(filter = '') {
  const body = document.getElementById('list-body');
  const f = filter.toLowerCase();
  const grouped = {};
  for (const tier of TIERS) grouped[tier] = [];

  for (const item of items) {
    if (f && !item.name.toLowerCase().includes(f) && !item.id.toLowerCase().includes(f)) continue;
    const tier = TIERS.includes(item.tier) ? item.tier : 'garage';
    grouped[tier].push(item);
  }

  let html = '';
  for (const tier of TIERS) {
    const group = grouped[tier];
    if (group.length === 0 && !f) continue;
    const color = TIER_COLORS[tier] || '#6272a4';
    const name = TIER_NAMES[tier] || tier;
    html += '<div class="tier-group-header" style="color:' + color + '">' + name + ' (' + group.length + ')</div>';
    for (const item of group) {
      const sel = item.id === selectedId ? ' selected' : '';
      const fx = item.effects.map(e => e.type + ':' + e.value).join(', ') || 'none';
      const cat = item.costCategory ? ' [' + item.costCategory + ']' : '';
      html += '<div class="item-card' + sel + '" onclick="selectedId=\'' + item.id + '\'; render()">'
        + '<div class="name">' + item.icon + ' ' + escapeHtml(item.name) + cat + '</div>'
        + '<div class="meta">' + item.id + ' | max:' + item.max + ' | x' + item.costMultiplier + '</div>'
        + '<div class="cost">$' + formatNum(item.baseCost) + ' | ' + fx + '</div>'
        + '</div>';
    }
  }
  body.innerHTML = html;
}

function renderEditor() {
  const body = document.getElementById('editor-body');
  const item = getItem(selectedId);
  if (!item) { body.innerHTML = '<div class="editor-empty">Select an item to edit</div>'; return; }

  const tierOptions = TIERS.map(t =>
    '<option value="' + t + '"' + (t === item.tier ? ' selected' : '') + '>' + (TIER_NAMES[t] || t) + '</option>'
  ).join('');

  const catOptions = COST_CATEGORIES.map(c =>
    '<option value="' + c + '"' + (c === (item.costCategory || '') ? ' selected' : '') + '>' + (c || '(none)') + '</option>'
  ).join('');

  const effectsHtml = (item.effects || []).map((e, i) =>
    '<div class="effect-row">'
    + '<select onchange="updateEffect(' + i + ',\'type\',this.value)">' + EFFECT_TYPES.map(t => '<option value="' + t + '"' + (t === e.type ? ' selected' : '') + '>' + t + '</option>').join('') + '</select>'
    + '<select onchange="updateEffect(' + i + ',\'op\',this.value)">' + OPS.map(o => '<option value="' + o + '"' + (o === e.op ? ' selected' : '') + '>' + o + '</option>').join('') + '</select>'
    + '<input type="text" style="width:80px" value="' + e.value + '" onchange="updateEffect(' + i + ',\'value\',this.value)">'
    + '<button class="remove-effect" onclick="removeEffect(' + i + ')">×</button>'
    + '</div>'
  ).join('');

  // Cost preview: show cost at levels 1, 5, 10, max
  const levels = [1, 5, 10, Math.min(item.max, 50)].filter((v, i, a) => a.indexOf(v) === i && v <= item.max);
  const costPreview = levels.map(n => {
    const cost = Math.floor(item.baseCost * Math.pow(item.costMultiplier, n - 1));
    return '<div class="row"><span>#' + n + '</span><span class="val">$' + formatNum(cost) + '</span></div>';
  }).join('');

  body.innerHTML = '<div class="editor-body">'
    + '<div class="field-row">'
    + '<div class="field"><label>ID</label><input value="' + item.id + '" onchange="updateField(\'id\', this.value)"></div>'
    + '<div class="field"><label>Icon</label><input value="' + item.icon + '" style="width:40px" onchange="updateField(\'icon\', this.value)"></div>'
    + '</div>'
    + '<div class="field"><label>Name</label><input value="' + escapeHtml(item.name) + '" onchange="updateField(\'name\', this.value)"></div>'
    + '<div class="field"><label>Description</label><input value="' + escapeHtml(item.description) + '" onchange="updateField(\'description\', this.value)"></div>'
    + '<div class="field-row">'
    + '<div class="field"><label>Tier</label><select onchange="updateField(\'tier\', this.value)">' + tierOptions + '</select></div>'
    + '<div class="field"><label>Cost Category</label><select onchange="updateField(\'costCategory\', this.value)">' + catOptions + '</select></div>'
    + '</div>'
    + '<div class="field-row">'
    + '<div class="field"><label>Base Cost</label><input type="number" value="' + item.baseCost + '" onchange="updateField(\'baseCost\', +this.value)"></div>'
    + '<div class="field"><label>Cost ×</label><input type="number" step="0.05" value="' + item.costMultiplier + '" onchange="updateField(\'costMultiplier\', +this.value)"></div>'
    + '<div class="field"><label>Max</label><input type="number" value="' + item.max + '" onchange="updateField(\'max\', +this.value)"></div>'
    + '</div>'
    + '<div class="cost-preview"><div class="row" style="color:#6272a4;font-weight:bold"><span>Level</span><span>Cost</span></div>' + costPreview + '</div>'
    + '<div class="field" style="margin-top:12px"><label>Effects</label>'
    + '<div class="effects-editor">' + effectsHtml + '</div>'
    + '<button class="add-effect-btn" onclick="addEffect()">+ Add Effect</button>'
    + '</div>'
    + '<div style="display:flex;gap:8px;margin-top:12px">'
    + '<button style="flex:1;padding:4px;background:none;border:1px solid #1e2630;color:#6272a4;cursor:pointer;font-family:inherit;font-size:11px;border-radius:4px" onclick="moveItem(\'' + item.id + '\',-1)">↑ Move Up</button>'
    + '<button style="flex:1;padding:4px;background:none;border:1px solid #1e2630;color:#6272a4;cursor:pointer;font-family:inherit;font-size:11px;border-radius:4px" onclick="moveItem(\'' + item.id + '\',1)">↓ Move Down</button>'
    + '</div>'
    + '<button class="delete-btn" onclick="deleteItem(\'' + item.id + '\')">Delete Item</button>'
    + '</div>';
}

// ── Field updates ──

function updateField(key, value) {
  const item = getItem(selectedId);
  if (!item) return;
  if (key === 'id') {
    const oldId = item.id;
    item.id = value;
    selectedId = value;
  } else if (key === 'costCategory') {
    if (value === '') delete item.costCategory;
    else item.costCategory = value;
  } else {
    item[key] = value;
  }
  save(); render();
}

function addEffect() {
  const item = getItem(selectedId);
  if (!item) return;
  if (!item.effects) item.effects = [];
  item.effects.push({ type: 'flops', op: 'add', value: 1 });
  save(); render();
}

function updateEffect(i, key, value) {
  const item = getItem(selectedId);
  if (!item || !item.effects[i]) return;
  if (key === 'value') {
    if (value === 'true') value = true;
    else if (value === 'false') value = false;
    else if (!isNaN(+value)) value = +value;
  }
  item.effects[i][key] = value;
  save(); render();
}

function removeEffect(i) {
  const item = getItem(selectedId);
  if (!item) return;
  item.effects.splice(i, 1);
  save(); render();
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.key === 'Delete' && selectedId && !e.target.closest('input, textarea, select')) {
    deleteItem(selectedId);
  }
});

// ── Init ──
loadFromServer();
</script>
</body>
</html>
