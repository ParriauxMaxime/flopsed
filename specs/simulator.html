<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGI Rush — Balance Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e14;
    color: #c5c8c6;
    font-family: 'Courier New', monospace;
    padding: 20px;
    line-height: 1.5;
  }

  h1 { color: #58a6ff; margin-bottom: 4px; font-size: 1.4em; }
  h2 { color: #c678dd; margin: 24px 0 8px; font-size: 1.1em; }
  h3 { color: #e5c07b; margin: 16px 0 6px; font-size: 1em; }

  .subtitle { color: #6272a4; font-size: 0.85em; margin-bottom: 20px; }

  /* Controls */
  #controls {
    background: #161b22;
    border: 1px solid #1e2630;
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 20px;
    display: flex;
    gap: 24px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .control-group { display: flex; flex-direction: column; gap: 4px; }
  .control-group label { font-size: 11px; color: #6272a4; text-transform: uppercase; letter-spacing: 0.5px; }
  .control-group input, .control-group select {
    background: #0d1117;
    border: 1px solid #1e2630;
    color: #c5c8c6;
    padding: 6px 10px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    width: 140px;
  }

  button {
    background: #238636;
    color: #fff;
    border: none;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: bold;
  }
  button:hover { background: #2ea043; }

  /* Chart */
  #chart-container {
    background: #0d1117;
    border: 1px solid #1e2630;
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 20px;
    overflow-x: auto;
  }

  canvas { width: 100%; height: 300px; }

  /* Timeline */
  #timeline {
    background: #0d1117;
    border: 1px solid #1e2630;
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 20px;
  }

  .timeline-bar {
    display: flex;
    height: 40px;
    border-radius: 4px;
    overflow: hidden;
    margin: 8px 0;
  }

  .timeline-segment {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    min-width: 2px;
    position: relative;
    overflow: hidden;
  }

  /* Log */
  #log-container {
    background: #0d1117;
    border: 1px solid #1e2630;
    border-radius: 6px;
    padding: 16px;
    max-height: 500px;
    overflow-y: auto;
  }

  .log-entry {
    font-size: 12px;
    padding: 3px 0;
    border-bottom: 1px solid #0a0e14;
    display: flex;
    gap: 12px;
  }

  .log-time { color: #6272a4; min-width: 60px; }
  .log-event { color: #abb2bf; flex: 1; }
  .log-cash { color: #3fb950; min-width: 100px; text-align: right; }
  .log-loc { color: #58a6ff; min-width: 80px; text-align: right; }
  .log-flops { color: #e5c07b; min-width: 80px; text-align: right; }

  .log-entry.tier-unlock { background: #1a1040; }
  .log-entry.purchase { }
  .log-entry.wall { background: #1a0e0e; }
  .log-entry.ai-unlock { background: #0e1a1a; }

  /* Summary */
  #summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .summary-card {
    background: #161b22;
    border: 1px solid #1e2630;
    border-radius: 6px;
    padding: 12px;
    text-align: center;
  }

  .summary-value { font-size: 1.5em; font-weight: bold; color: #58a6ff; }
  .summary-label { font-size: 11px; color: #6272a4; margin-top: 4px; }

  /* Purchase timeline dots */
  #purchase-density {
    position: relative;
    height: 60px;
    background: #161b22;
    border: 1px solid #1e2630;
    border-radius: 6px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .purchase-dot {
    position: absolute;
    width: 3px;
    bottom: 0;
    background: #58a6ff;
    border-radius: 1px 1px 0 0;
    opacity: 0.8;
  }

  .purchase-dot.tier { background: #c678dd; }
  .purchase-dot.ai { background: #3fb950; }

  #density-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #484f58;
    padding: 0 4px;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<h1>AGI Rush — Balance Simulator</h1>
<p class="subtitle">Simulates a playthrough with a configurable "player" to validate pacing. Tweak the JSONs, refresh, check the curves.</p>

<div id="controls">
  <div class="control-group">
    <label>Player Typing Speed</label>
    <input type="number" id="input-keys-per-sec" value="6" min="1" max="20" step="1">
    <label style="margin-top:2px; font-size:10px;">keys/sec (avg human: 5-8)</label>
  </div>
  <div class="control-group">
    <label>Purchase Skill</label>
    <select id="input-skill">
      <option value="0.6">Casual (60% optimal)</option>
      <option value="0.8" selected>Average (80% optimal)</option>
      <option value="0.95">Minmaxer (95% optimal)</option>
    </select>
  </div>
  <div class="control-group">
    <label>AI Slider Strategy</label>
    <select id="input-ai-strategy">
      <option value="balanced" selected>Balanced (auto 50/50)</option>
      <option value="exec-heavy">Exec Heavy (70/30)</option>
      <option value="ai-heavy">AI Heavy (30/70)</option>
    </select>
  </div>
  <div class="control-group">
    <label>Max Sim Time</label>
    <input type="number" id="input-max-minutes" value="60" min="10" max="120" step="5">
    <label style="margin-top:2px; font-size:10px;">minutes (stops if AGI reached)</label>
  </div>
  <button onclick="runSimulation()">Run Simulation</button>
</div>

<div id="summary"></div>

<h2>Purchase Density</h2>
<div id="density-labels"></div>
<div id="purchase-density"></div>

<h2>Tier Timeline</h2>
<div id="timeline"></div>

<h2>Curves</h2>
<div id="chart-container">
  <canvas id="chart-cash"></canvas>
</div>
<div id="chart-container">
  <canvas id="chart-loc"></canvas>
</div>

<h2>Event Log</h2>
<div id="log-container"></div>

<script>
// ── Data loading ──
let DATA = { tiers: null, upgrades: null, aiModels: null, milestones: null, balance: null, events: null };

async function loadData() {
  const files = {
    tiers: 'data/tiers.json',
    upgrades: 'data/upgrades.json',
    aiModels: 'data/ai-models.json',
    milestones: 'data/milestones.json',
    balance: 'data/balance.json',
    events: 'data/events.json',
  };
  await Promise.all(Object.entries(files).map(async ([key, path]) => {
    try {
      const r = await fetch(path);
      DATA[key] = await r.json();
    } catch (e) {
      console.warn(`Failed to load ${path}:`, e);
    }
  }));
}

// ── Simulation Engine ──
function runSimulation() {
  const keysPerSec = parseFloat(document.getElementById('input-keys-per-sec').value);
  const skill = parseFloat(document.getElementById('input-skill').value);
  const aiStrategy = document.getElementById('input-ai-strategy').value;
  const maxMinutes = parseInt(document.getElementById('input-max-minutes').value);

  const balance = DATA.balance;
  const tiers = DATA.tiers.tiers;
  const upgrades = DATA.upgrades.upgrades;
  const aiModels = DATA.aiModels.models;

  // ── Sim State ──
  const sim = {
    cash: balance.core.startingCash,
    totalCash: 0,
    loc: 0,
    totalLoc: 0,
    manualLoc: 0,
    aiLoc: 0,
    flops: balance.core.startingFlops,
    locPerKey: balance.core.startingLocPerKey,
    locPerKeyMultiplier: 1,
    autoLocPerSec: 0,
    devSpeedMultiplier: 1,
    cashMultiplier: 1,
    aiLocMultiplier: 1,
    codeQuality: balance.core.manualTypingQuality,
    currentTier: 0,
    owned: {},        // upgradeId -> count
    ownedModels: {},  // modelId -> true
    time: 0,          // seconds
    flopSlider: balance.flopsAllocation.defaultSplit,
    aiUnlocked: false,
  };

  const log = [];
  const snapshots = [];   // per-minute snapshots
  const purchases = [];   // { time, type, name }

  function getUpgradeCost(u) {
    const owned = sim.owned[u.id] || 0;
    const category = getCostCategory(u);
    const rate = balance.costCurve[category]?.growthRate || 1.12;
    return Math.floor(u.baseCost * Math.pow(rate, owned));
  }

  function getCostCategory(u) {
    if (u.effects.some(e => e.type === 'flops')) return 'hardware';
    if (u.effects.some(e => e.type === 'locPerKey')) return 'typing';
    if (u.effects.some(e => e.type === 'autoLoc')) return 'devs';
    if (u.effects.some(e => e.type === 'aiLocMultiplier' || e.type === 'aiQualityBonus')) return 'aiModels';
    return 'infrastructure';
  }

  function applyEffects(u) {
    for (const e of u.effects) {
      switch (e.type) {
        case 'locPerKey':
          if (e.op === 'add') sim.locPerKey += e.value;
          if (e.op === 'multiply') sim.locPerKeyMultiplier *= e.value;
          break;
        case 'flops':
          if (e.op === 'add') sim.flops += e.value;
          break;
        case 'autoLoc':
          if (e.op === 'add') sim.autoLocPerSec += e.value;
          break;
        case 'locProductionSpeed':
          if (e.op === 'multiply') sim.devSpeedMultiplier *= e.value;
          break;
        case 'devSpeed':
          if (e.op === 'multiply') sim.devSpeedMultiplier *= e.value;
          break;
        case 'cashMultiplier':
          if (e.op === 'multiply') sim.cashMultiplier *= e.value;
          break;
        case 'aiLocMultiplier':
          if (e.op === 'multiply') sim.aiLocMultiplier *= e.value;
          break;
        case 'instantCash':
          if (e.op === 'add') { sim.cash += e.value; sim.totalCash += e.value; }
          break;
      }
    }
  }

  function getEffectiveLocPerKey() {
    return sim.locPerKey * sim.locPerKeyMultiplier * sim.devSpeedMultiplier;
  }

  function getCashPerLoc() {
    const tier = tiers[sim.currentTier];
    return tier.cashPerLoc * sim.cashMultiplier * (sim.codeQuality / 100);
  }

  function getAvailableUpgrades() {
    return upgrades.filter(u => {
      const tier = tiers.find(t => t.id === u.tier);
      if (!tier || tier.index > sim.currentTier) return false;
      const owned = sim.owned[u.id] || 0;
      if (owned >= u.max) return false;
      return true;
    });
  }

  function getAvailableModels() {
    if (sim.currentTier < 4) return [];
    return aiModels.filter(m => {
      if (sim.ownedModels[m.id]) return false;
      if (m.requires && !sim.ownedModels[m.requires]) return false;
      return true;
    });
  }

  function getBestPurchase() {
    // Smart heuristic: value depends on what's currently bottlenecked
    const candidates = [];

    // Current production rates
    const totalLocPerSec = getEffectiveLocPerKey() * keysPerSec + sim.autoLocPerSec * sim.devSpeedMultiplier;
    const execCapacity = sim.aiUnlocked ? sim.flops * sim.flopSlider : sim.flops;
    const isFlopsBottlenecked = totalLocPerSec > execCapacity;

    for (const u of getAvailableUpgrades()) {
      const cost = getUpgradeCost(u);
      if (cost > sim.cash) continue;

      // Estimate value: how much does this increase CASH per second?
      let valuePerSec = 0;
      for (const e of u.effects) {
        if (e.type === 'flops' && e.op === 'add') {
          // FLOPS are worth more when we're bottlenecked on them
          const flopValue = isFlopsBottlenecked ? 2.0 : 0.5;
          valuePerSec += e.value * getCashPerLoc() * flopValue;
        }
        if (e.type === 'locPerKey' && e.op === 'add') {
          // LoC typing is only valuable if we have FLOPS to execute
          const locValue = isFlopsBottlenecked ? 0.3 : 1.0;
          valuePerSec += e.value * keysPerSec * getCashPerLoc() * locValue;
        }
        if (e.type === 'locPerKey' && e.op === 'multiply') {
          const locValue = isFlopsBottlenecked ? 0.3 : 1.0;
          valuePerSec += (sim.locPerKey * (e.value - 1)) * keysPerSec * getCashPerLoc() * locValue;
        }
        if (e.type === 'autoLoc' && e.op === 'add') {
          const locValue = isFlopsBottlenecked ? 0.3 : 1.0;
          valuePerSec += e.value * getCashPerLoc() * locValue;
        }
        if (e.type === 'cashMultiplier' && e.op === 'multiply') {
          const currentIncome = Math.min(totalLocPerSec, execCapacity) * getCashPerLoc();
          valuePerSec += currentIncome * (e.value - 1);
        }
        if (e.type === 'locProductionSpeed' && e.op === 'multiply') {
          const locValue = isFlopsBottlenecked ? 0.3 : 1.0;
          valuePerSec += totalLocPerSec * (e.value - 1) * getCashPerLoc() * locValue;
        }
        if (e.type === 'devSpeed' && e.op === 'multiply') {
          const locValue = isFlopsBottlenecked ? 0.3 : 1.0;
          valuePerSec += sim.autoLocPerSec * (e.value - 1) * getCashPerLoc() * locValue;
        }
        if (e.type === 'instantCash' && e.op === 'add') {
          // Instant cash is very valuable — treat as income over 60s
          valuePerSec += e.value / 60;
        }
      }

      if (valuePerSec > 0) {
        candidates.push({ type: 'upgrade', item: u, cost, value: valuePerSec / cost });
      }
    }

    // AI models
    for (const m of getAvailableModels()) {
      if (m.cost > sim.cash) continue;
      const valuePerSec = m.locPerSec * sim.aiLocMultiplier * getCashPerLoc();
      candidates.push({ type: 'model', item: m, cost: m.cost, value: valuePerSec / m.cost });
    }

    if (candidates.length === 0) return null;

    // Sort by value, but apply skill factor (sometimes pick suboptimally)
    candidates.sort((a, b) => b.value - a.value);

    if (Math.random() > skill && candidates.length > 1) {
      // Pick a random one from top 3
      const idx = Math.floor(Math.random() * Math.min(3, candidates.length));
      return candidates[idx];
    }

    return candidates[0];
  }

  // ── Main simulation loop (1 tick = 1 second) ──
  const maxSeconds = maxMinutes * 60;
  let agiReached = false;
  let lastPurchaseTime = 0;
  let longestWait = 0;

  for (let t = 0; t < maxSeconds && !agiReached; t++) {
    sim.time = t;

    // ── Manual typing ──
    const manualLoc = getEffectiveLocPerKey() * keysPerSec;
    sim.loc += manualLoc;
    sim.totalLoc += manualLoc;
    sim.manualLoc += manualLoc;

    // ── Dev auto-LoC (no FLOPS cost) ──
    const devLoc = sim.autoLocPerSec * sim.devSpeedMultiplier;
    sim.loc += devLoc;
    sim.totalLoc += devLoc;

    // ── AI generation (costs FLOPS) ──
    let aiLoc = 0;
    if (sim.aiUnlocked) {
      const aiFlops = sim.flops * (1 - sim.flopSlider);
      const execFlops = sim.flops * sim.flopSlider;

      let totalAiLocPerSec = 0;
      let totalAiFlopsCost = 0;
      for (const [id, owned] of Object.entries(sim.ownedModels)) {
        if (!owned) continue;
        const model = aiModels.find(m => m.id === id);
        if (model) {
          totalAiLocPerSec += model.locPerSec * sim.aiLocMultiplier;
          totalAiFlopsCost += model.flopsCost;
        }
      }

      // Scale AI output by available FLOPS
      if (totalAiFlopsCost > 0) {
        const aiCapacity = Math.min(1, aiFlops / totalAiFlopsCost);
        aiLoc = totalAiLocPerSec * aiCapacity;
        sim.loc += aiLoc;
        sim.totalLoc += aiLoc;
        sim.aiLoc += aiLoc;
      }

      // Execute LoC with remaining FLOPS
      const executed = Math.min(sim.loc, execFlops);
      const cash = executed * getCashPerLoc();
      sim.cash += cash;
      sim.totalCash += cash;
      sim.loc -= executed;
    } else {
      // Pre-AI: all FLOPS go to execution
      const executed = Math.min(sim.loc, sim.flops);
      const cash = executed * getCashPerLoc();
      sim.cash += cash;
      sim.totalCash += cash;
      sim.loc -= executed;
    }

    // ── Quality decay ──
    const aiDecay = aiLoc * balance.qualityCurve.aiQualityDecayMultiplier;
    sim.codeQuality -= (balance.qualityCurve.qualityDecayPerMinute / 60) + aiDecay;
    sim.codeQuality = Math.max(sim.codeQuality, 40); // absolute floor

    // ── Try to buy (up to 5 per tick for burst buying) ──
    for (let buyAttempt = 0; buyAttempt < 5; buyAttempt++) {
      const purchase = getBestPurchase();
      if (!purchase) break;

      const wait = t - lastPurchaseTime;
      if (wait > longestWait && buyAttempt === 0) longestWait = wait;

      if (purchase.type === 'upgrade') {
        const u = purchase.item;
        const cost = getUpgradeCost(u);
        sim.cash -= cost;
        sim.owned[u.id] = (sim.owned[u.id] || 0) + 1;
        applyEffects(u);
        log.push({ time: t, type: 'purchase', msg: `Bought ${u.name} (#${sim.owned[u.id]}) for $${formatNum(cost)}`, cash: sim.cash, loc: sim.totalLoc, flops: sim.flops });
        purchases.push({ time: t, type: 'upgrade', name: u.name });
      } else if (purchase.type === 'model') {
        const m = purchase.item;
        sim.cash -= m.cost;
        sim.ownedModels[m.id] = true;
        if (!sim.aiUnlocked) {
          sim.aiUnlocked = true;
          if (aiStrategy === 'exec-heavy') sim.flopSlider = 0.7;
          else if (aiStrategy === 'ai-heavy') sim.flopSlider = 0.3;
          else sim.flopSlider = 0.5;
          log.push({ time: t, type: 'ai-unlock', msg: `AI UNLOCKED! FLOPS slider active.`, cash: sim.cash, loc: sim.totalLoc, flops: sim.flops });
        }
        log.push({ time: t, type: 'purchase ai', msg: `Bought ${m.name} ${m.version} for $${formatNum(m.cost)}`, cash: sim.cash, loc: sim.totalLoc, flops: sim.flops });
        purchases.push({ time: t, type: 'ai', name: `${m.name} ${m.version}` });
      }
      lastPurchaseTime = t;
    }

    // ── Check tier unlock (can unlock multiple in one tick) ──
    while (sim.currentTier < tiers.length - 1) {
      const next = tiers[sim.currentTier + 1];
      if (sim.totalLoc >= next.locRequired && sim.totalCash >= next.cashRequired && sim.cash >= next.cost) {
        sim.cash -= next.cost;
        sim.currentTier++;
        log.push({ time: t, type: 'tier-unlock', msg: `TIER UNLOCKED: ${next.name} (${next.tagline})`, cash: sim.cash, loc: sim.totalLoc, flops: sim.flops });
        purchases.push({ time: t, type: 'tier', name: next.name });
      } else {
        break;
      }
    }

    // ── Check AGI ──
    if (sim.totalLoc >= 100000000) {
      agiReached = true;
      log.push({ time: t, type: 'tier-unlock', msg: `AGI ACHIEVED at ${formatTime(t)}!`, cash: sim.cash, loc: sim.totalLoc, flops: sim.flops });
    }

    // ── Snapshot every 10 seconds ──
    if (t % 10 === 0) {
      snapshots.push({
        time: t,
        cash: sim.totalCash,
        loc: sim.totalLoc,
        flops: sim.flops,
        quality: sim.codeQuality,
        locPerSec: manualLoc + devLoc + aiLoc,
        cashPerSec: Math.min(sim.loc + manualLoc + devLoc + aiLoc, sim.flops) * getCashPerLoc(),
        tier: sim.currentTier,
      });
    }
  }

  // ── Render results ──
  renderSummary(sim, log, purchases, longestWait, agiReached);
  renderTimeline(sim, log, tiers);
  renderPurchaseDensity(purchases, sim.time);
  renderCharts(snapshots);
  renderLog(log);
}

// ── Formatting ──
function formatNum(n) {
  if (n >= 1e12) return (n / 1e12).toFixed(2) + 'T';
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return Math.floor(n).toString();
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// ── Render: Summary Cards ──
function renderSummary(sim, log, purchases, longestWait, agiReached) {
  const tierUnlocks = log.filter(l => l.type === 'tier-unlock');
  const totalPurchases = purchases.filter(p => p.type !== 'tier').length;

  document.getElementById('summary').innerHTML = `
    <div class="summary-card">
      <div class="summary-value">${formatTime(sim.time)}</div>
      <div class="summary-label">${agiReached ? 'AGI Reached' : 'Sim Ended (no AGI)'}</div>
    </div>
    <div class="summary-card">
      <div class="summary-value">${totalPurchases}</div>
      <div class="summary-label">Total Purchases</div>
    </div>
    <div class="summary-card">
      <div class="summary-value">${formatTime(longestWait)}</div>
      <div class="summary-label">Longest Wait</div>
    </div>
    <div class="summary-card">
      <div class="summary-value">${formatNum(sim.totalCash)}</div>
      <div class="summary-label">Lifetime Cash</div>
    </div>
    <div class="summary-card">
      <div class="summary-value">${formatNum(sim.totalLoc)}</div>
      <div class="summary-label">Lifetime LoC</div>
    </div>
    <div class="summary-card">
      <div class="summary-value">${Math.round(sim.codeQuality)}%</div>
      <div class="summary-label">Final Quality</div>
    </div>
    <div class="summary-card">
      <div class="summary-value">${Object.keys(sim.ownedModels).length}</div>
      <div class="summary-label">AI Models Owned</div>
    </div>
    <div class="summary-card">
      <div class="summary-value" style="color:${agiReached ? '#3fb950' : '#e06c75'}">${agiReached ? 'YES' : 'NO'}</div>
      <div class="summary-label">AGI Achieved</div>
    </div>
  `;
}

// ── Render: Tier Timeline Bar ──
function renderTimeline(sim, log, tiers) {
  const container = document.getElementById('timeline');
  const tierTimes = [];
  const tierLogs = log.filter(l => l.type === 'tier-unlock');

  // First tier starts at 0
  tierTimes.push({ name: tiers[0].name, start: 0 });
  for (const tl of tierLogs) {
    tierTimes.push({ name: tl.msg.includes(':') ? tl.msg.split(': ')[1]?.split(' (')[0] : tl.msg, start: tl.time });
  }

  const totalTime = sim.time || 1;
  const colors = ['#3b4048', '#6272a4', '#61afef', '#c678dd', '#e5c07b', '#e06c75'];

  let html = '<div class="timeline-bar">';
  for (let i = 0; i < tierTimes.length; i++) {
    const start = tierTimes[i].start;
    const end = (i + 1 < tierTimes.length) ? tierTimes[i + 1].start : totalTime;
    const pct = ((end - start) / totalTime * 100);
    html += `<div class="timeline-segment" style="width:${pct}%;background:${colors[i] || colors[5]}" title="${tierTimes[i].name}: ${formatTime(start)} - ${formatTime(end)}">
      ${pct > 8 ? tierTimes[i].name : ''}
    </div>`;
  }
  html += '</div>';

  // Time labels
  html += '<div style="display:flex;justify-content:space-between;font-size:10px;color:#484f58;margin-top:4px;">';
  for (let m = 0; m <= Math.ceil(totalTime / 60); m += 5) {
    html += `<span>${m}m</span>`;
  }
  html += '</div>';

  container.innerHTML = html;
}

// ── Render: Purchase Density ──
function renderPurchaseDensity(purchases, totalTime) {
  const container = document.getElementById('purchase-density');
  const labels = document.getElementById('density-labels');
  totalTime = totalTime || 1;

  let dotsHtml = '';
  for (const p of purchases) {
    const left = (p.time / totalTime * 100);
    const cls = p.type === 'tier' ? 'tier' : p.type === 'ai' ? 'ai' : '';
    const height = p.type === 'tier' ? 60 : p.type === 'ai' ? 40 : 20;
    dotsHtml += `<div class="purchase-dot ${cls}" style="left:${left}%;height:${height}px;" title="${formatTime(p.time)}: ${p.name}"></div>`;
  }
  container.innerHTML = dotsHtml;

  let labelsHtml = '';
  for (let m = 0; m <= Math.ceil(totalTime / 60); m += 5) {
    labelsHtml += `<span>${m}m</span>`;
  }
  labels.innerHTML = labelsHtml;
}

// ── Render: Charts (simple canvas) ──
function renderCharts(snapshots) {
  drawChart('chart-cash', snapshots, 'cash', '#3fb950', 'Total Cash ($)', true);
  drawChart('chart-loc', snapshots, 'loc', '#58a6ff', 'Total LoC', true);
}

function drawChart(canvasId, data, key, color, label, logScale) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');

  // Set actual pixel size
  canvas.width = canvas.parentElement.clientWidth - 32;
  canvas.height = 280;

  const w = canvas.width;
  const h = canvas.height;
  const pad = { top: 30, right: 20, bottom: 30, left: 70 };

  ctx.clearRect(0, 0, w, h);

  if (data.length < 2) return;

  const values = data.map(d => d[key]);
  const maxVal = Math.max(...values, 1);
  const minVal = logScale ? Math.max(Math.min(...values.filter(v => v > 0)), 0.01) : 0;

  function toY(v) {
    if (logScale && v > 0) {
      const logMin = Math.log10(Math.max(minVal, 0.01));
      const logMax = Math.log10(maxVal);
      const logV = Math.log10(Math.max(v, 0.01));
      return pad.top + (h - pad.top - pad.bottom) * (1 - (logV - logMin) / (logMax - logMin || 1));
    }
    return pad.top + (h - pad.top - pad.bottom) * (1 - v / maxVal);
  }

  function toX(i) {
    return pad.left + (w - pad.left - pad.right) * (i / (data.length - 1));
  }

  // Grid
  ctx.strokeStyle = '#1e2630';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (h - pad.top - pad.bottom) * (i / 4);
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(w - pad.right, y);
    ctx.stroke();

    // Labels
    let val;
    if (logScale) {
      const logMin = Math.log10(Math.max(minVal, 0.01));
      const logMax = Math.log10(maxVal);
      val = Math.pow(10, logMax - (logMax - logMin) * (i / 4));
    } else {
      val = maxVal * (1 - i / 4);
    }
    ctx.fillStyle = '#484f58';
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(formatNum(val), pad.left - 8, y + 4);
  }

  // Time labels
  ctx.textAlign = 'center';
  for (let i = 0; i < data.length; i += Math.floor(data.length / 6) || 1) {
    const x = toX(i);
    ctx.fillText(formatTime(data[i].time), x, h - 8);
  }

  // Line
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  let started = false;
  for (let i = 0; i < data.length; i++) {
    const x = toX(i);
    const y = toY(values[i]);
    if (!started) { ctx.moveTo(x, y); started = true; }
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Fill
  ctx.globalAlpha = 0.1;
  ctx.lineTo(toX(data.length - 1), h - pad.bottom);
  ctx.lineTo(toX(0), h - pad.bottom);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.globalAlpha = 1;

  // Label
  ctx.fillStyle = color;
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(label + (logScale ? ' (log scale)' : ''), pad.left + 8, pad.top - 10);
}

// ── Render: Log ──
function renderLog(log) {
  const container = document.getElementById('log-container');
  let html = '';
  for (const entry of log) {
    const cls = entry.type.replace(' ', '-');
    html += `<div class="log-entry ${cls}">
      <span class="log-time">${formatTime(entry.time)}</span>
      <span class="log-event">${entry.msg}</span>
      <span class="log-cash">$${formatNum(entry.cash)}</span>
      <span class="log-loc">${formatNum(entry.loc)} LoC</span>
      <span class="log-flops">${formatNum(entry.flops)} F</span>
    </div>`;
  }
  container.innerHTML = html || '<div style="color:#484f58;text-align:center;padding:20px;">Run a simulation first</div>';
}
